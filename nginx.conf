server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redireciona /previncendio (sem barra) para /previncendio/
    location = /previncendio {
        return 301 /previncendio/;
    }

    # App servido sob /previncendio/
    location /previncendio/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /previncendio/index.html;
    }
}
